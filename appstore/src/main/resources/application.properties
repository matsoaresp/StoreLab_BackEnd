spring.application.name=appstore
spring.datasource.url=jdbc:postgresql://localhost:5432/StoreLab
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


api.security.token.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnly123456789}
api.security.token.expiration=24
